version: '3.8'

services:
  # Frontend React application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: dhamma-frontend
    ports:
      - "3000:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - dhamma-network
    depends_on:
      - api

  # Backend API service
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dhamma-api
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=dhamma_db;Username=dhamma_user;Password=dhamma_pass
      - CORS__AllowedOrigins=http://localhost:3000,http://frontend:3000
    depends_on:
      - postgres
    networks:
      - dhamma-network

  # PostgreSQL database
  postgres:
    image: postgres:16
    container_name: dhamma-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=dhamma_db
      - POSTGRES_USER=dhamma_user
      - POSTGRES_PASSWORD=dhamma_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - dhamma-network

  # Production frontend (optional - use with docker-compose -f docker-compose.yml -f docker-compose.prod.yml up)
  frontend-prod:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: dhamma-frontend-prod
    ports:
      - "80:80"
    environment:
      - NGINX_ENVSUBST_TEMPLATE_SUFFIX=.template
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - dhamma-network
    profiles:
      - production
    depends_on:
      - api

volumes:
  postgres_data:

networks:
  dhamma-network:
    driver: bridge
